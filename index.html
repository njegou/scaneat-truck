<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScanEat Truck - Commande Mobile</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f97316">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Configuration de l'image d'arrière-plan avec opacité */
        body {
            margin: 0;
            padding: 0;
            min-h-screen;
            position: relative; /* Nécessaire pour le positionnement du pseudo-élément */
            background-color: #f3f4f6; /* Couleur de fond de secours */
        }

        /* Pseudo-élément pour l'image d'arrière-plan */
        body::before {
            content: "";
            position: fixed; /* L'image reste fixe lors du défilement */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Place l'image derrière le contenu */
            
            /* Chemin vers ton image officielle */
            background-image: url('visuel scaneat truck.jpg');
            background-size: cover; /* L'image couvre tout l'écran */
            background-position: center; /* Centre l'image */
            background-repeat: no-repeat;
            
            /* Opacité demandée à 85% */
            opacity: 0.85;
        }

        /* Styles additionnels pour l'UX */
        @keyframes bounce-short {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        .animate-bounce-short {
            animation: bounce-short 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" src="app.js"></script>
</body>
</html>
