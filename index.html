<style>
    body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        position: relative;
        /* On garde un fond sombre pour que le texte blanc ressorte si besoin */
        background-color: #1a1a1a; 
    }

    body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        
        /* Vérifie que le nom est EXACTEMENT celui sur GitHub */
        background-image: url('visuel scaneat truck.jpg'); 
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        
        /* OPACITÉ RÉDUITE : 0.3 = on voit beaucoup l'image / 0.8 = on la voit peu */
        /* J'ai mis 0.4 pour un bon compromis visuel */
        opacity: 0.4;
    }
</style>
